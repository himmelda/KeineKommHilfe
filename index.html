// -------------------------------------
// Renderer für Schritte & Entscheidungen
// -------------------------------------
function renderStep(stepId) {
    const step = steps[stepId];
    const app = document.getElementById("app");
    app.innerHTML = "";

    const div = document.createElement("div");
    div.className = "step";

    // Text anzeigen
    if (step.text) {
        div.innerHTML = `<p>${step.text}</p>`;
    }
    
    // INFOBLOCK UNTER TITEL (NEU)
    if (step.info) {
        div.innerHTML += `<div class="infobox">${step.info}</div>`;
    }

    // Buttons bei Auswahlfragen
    if (step.options) {
        Object.entries(step.options).forEach(([label, next]) => {
            const btn = document.createElement("button");
            btn.textContent = label;
            btn.onclick = () => renderStep(next);
            div.appendChild(btn);
        });
    }

    // Ergebnis anzeigen
    if (step.result) {
        div.innerHTML += `<div class="result">${step.result}</div>`;
    }

    app.appendChild(div);
}

// Diagnose starten
