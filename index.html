<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Troubleshooting</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f7f7f7;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 15px;
      }

      .language-box {
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        text-align: center;
        width: 100%;
        max-width: 400px;
      }

      h1 {
        margin-bottom: 20px;
        font-size: 22px;
      }

      a {
        display: block;
        margin: 10px 0;
        padding: 14px;
        font-size: 16px;
        text-decoration: none;
        font-weight: bold;
        color: white;
        background: #0078d4;
        border-radius: 10px;
        transition:
          background 0.2s,
          transform 0.1s;
      }

      a:hover {
        background: #005fa3;
      }

      a:active {
        transform: scale(0.97);
      }

      @media (max-width: 480px) {
        .language-box {
          padding: 20px;
        }

        h1 {
          font-size: 20px;
        }

        a {
          font-size: 15px;
          padding: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="language-box">
      <h1>Select Language</h1>

      <a href="renderer.html?lang=de"> <span class="flag">🇩🇪</span> Deutsch </a>

      <a href="renderer.html?lang=en"> <span class="flag">🇬🇧</span> English </a>

      <a href="renderer.html?lang=fr">
        <span class="flag">🇫🇷</span> Français
      </a>
    </div>
  </body>
</html>
