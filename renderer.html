      // ---------------------------
      // Language selector and renderer
      // ---------------------------

      const params = new URLSearchParams(window.location.search);
      const langFromUrl = params.get("lang");

      let currentLang = langFromUrl || localStorage.getItem("lang");
      let DEBUG = params.has("DEBUG");
      let translations = {};
      let currentStep = "start";

      async function loadLanguage(lang) {
        try {
          const res = await fetch(`lang/${lang}.json`);
          if (!res.ok) throw new Error("Language file not found");

          translations = await res.json();
          document.getElementById("title").textContent = translations.title;
          renderStep(currentStep);
        } catch (e) {
          console.error("Fehler beim Laden der Sprache:", e);
        }
      }

      function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem("lang", lang);
        loadLanguage(lang);
      }

      function t(key) {
        return translations[key] || key;
      }

      function renderStep(stepId) {
        currentStep = stepId;
        const step = steps[stepId];
        const app = document.getElementById("app");

        app.innerHTML = "";

        const div = document.createElement("div");

        // render debug ID
        if (DEBUG) {
          if (step.ID) {
            div.innerHTML += `<p>${step.ID}</p>`;
          }
        }

        // render (Main) text
        if (step.textKey) {
          div.innerHTML += `<p>${t(step.textKey)}</p>`;
        }

        // render additional info text (optional)
        if (step.infoKey) {
          div.innerHTML += `<div class="infobox">${t(step.infoKey)}</div>`;
        }

        // render image (optional)
        if (step.image) {
          div.innerHTML += `
            <div class="imagebox">
            <img src="${step.image}" alt="Schrittbild">
            </div>
        `;
        }

        // render options to choose as buttons
        if (step.options) {
          Object.entries(step.options).forEach(([key, next]) => {
            const btn = document.createElement("button");
            btn.textContent = t(key);
            btn.onclick = () => renderStep(next);
            div.appendChild(btn);
          });
        }

        // render result (optional)
        if (step.resultKey) {
          div.innerHTML += `<div class="result">${t(step.resultKey)}</div>`;
        }

        app.appendChild(div);
      }
